<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 활용능력 자가검진 — 입문자용</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800&display=swap');

    :root {
      --primary: #6C5CE7;
      --primary-light: #A29BFE;
      --primary-dark: #4A3AB5;
      --accent: #00CEC9;
      --accent2: #FD79A8;
      --bg: #F8F9FE;
      --card: #FFFFFF;
      --text: #2D3436;
      --text-light: #636E72;
      --border: #E8E8F0;
      --gradient1: linear-gradient(135deg, #6C5CE7 0%, #A29BFE 100%);
      --gradient2: linear-gradient(135deg, #00CEC9 0%, #81ECEC 100%);
      --shadow: 0 4px 20px rgba(108, 92, 231, 0.1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
      min-height: 100vh;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 20px;
    }

    .screen {
      display: none;
    }

    .screen.active {
      display: block;
    }

    /* ===== INTRO ===== */
    .intro-hero {
      text-align: center;
      padding: 34px 20px 18px;
    }

    .intro-hero .hero-figure {
      width: 150px;
      margin: 0 auto 12px;
      display: block;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-10px);
      }
    }

    .intro-summary {
      display: inline-block;
      font-size: 14px;
      color: var(--text-light);
      background: #F4F3FF;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 8px 14px;
      margin-bottom: 14px;
    }

    .intro-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 18px;
    }

    .intro-card {
      background: var(--card);
      border-radius: 14px;
      padding: 16px 12px;
      text-align: center;
      border: 1px solid var(--border);
      transition: transform 0.2s;
    }

    .intro-card:hover {
      transform: translateY(-2px);
    }

    .intro-card .ic-emoji {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      margin: 0 auto 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #F8F7FF;
    }

    .intro-card .ic-emoji svg {
      width: 20px;
      height: 20px;
    }

    .intro-card .ic-title {
      font-size: 13px;
      font-weight: 600;
    }

    .btn-start {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--gradient1);
      color: white;
      border: none;
      padding: 16px 48px;
      border-radius: 50px;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 4px 15px rgba(108, 92, 231, 0.4);
      font-family: 'Noto Sans KR', sans-serif;
    }

    .btn-start:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 25px rgba(108, 92, 231, 0.5);
    }

    .intro-note {
      font-size: 13px;
      color: var(--text-light);
      margin-top: 12px;
    }

    /* ===== QUIZ ===== */
    .progress-bar-wrap {
      background: var(--border);
      border-radius: 20px;
      height: 8px;
      margin-bottom: 8px;
      overflow: hidden;
      position: sticky;
      top: 12px;
      z-index: 100;
    }

    .progress-bar {
      height: 100%;
      background: var(--gradient1);
      border-radius: 20px;
      transition: width 0.4s ease;
      width: 0%;
    }

    .progress-text {
      text-align: right;
      font-size: 13px;
      color: var(--text-light);
      margin-bottom: 20px;
    }

    .category-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: white;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 14px;
    }

    .question-card {
      background: var(--card);
      border-radius: 20px;
      padding: 30px;
      box-shadow: var(--shadow);
      margin-bottom: 20px;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .question-number {
      font-size: 13px;
      color: var(--primary);
      font-weight: 600;
      margin-bottom: 8px;
    }

    .question-text {
      font-size: 17px;
      font-weight: 600;
      margin-bottom: 22px;
      line-height: 1.6;
    }

    .question-tip {
      background: #F0EFFF;
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 18px;
      font-size: 14px;
      color: var(--primary-dark);
      border-left: 4px solid var(--primary-light);
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .option {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 14px 18px;
      border: 2px solid var(--border);
      border-radius: 14px;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 15px;
      background: white;
      line-height: 1.5;
    }

    .option:hover {
      border-color: var(--primary-light);
      background: #F8F7FF;
    }

    .option.selected {
      border-color: var(--primary);
      background: #F0EFFF;
    }

    .option-radio {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 2px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 1px;
      transition: all 0.2s;
    }

    .option.selected .option-radio {
      border-color: var(--primary);
      background: var(--primary);
    }

    .option.selected .option-radio::after {
      content: '';
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: white;
    }

    .nav-buttons {
      display: flex;
      justify-content: space-between;
      margin-top: 20px;
    }

    .btn-nav {
      padding: 12px 28px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Noto Sans KR', sans-serif;
      border: none;
    }

    .btn-prev {
      background: var(--border);
      color: var(--text-light);
    }

    .btn-prev:hover {
      background: #DDDDE5;
    }

    .btn-next {
      background: var(--gradient1);
      color: white;
      box-shadow: 0 4px 12px rgba(108, 92, 231, 0.3);
    }

    .btn-next:hover {
      box-shadow: 0 6px 20px rgba(108, 92, 231, 0.4);
    }

    .btn-next:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* ===== RESULT ===== */
    .result-header {
      text-align: center;
      padding: 40px 20px 16px;
    }

    .result-header .emoji-big {
      font-size: 52px;
      margin-bottom: 10px;
      color: var(--primary);
    }

    .result-header .emoji-big .icon-inline {
      width: 52px;
      height: 52px;
      margin: 0 auto;
    }

    .level-badge {
      display: inline-block;
      padding: 8px 24px;
      border-radius: 30px;
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .level-1 {
      background: #FFF0E0;
      color: #E17055;
    }

    .level-2 {
      background: #FFF8E1;
      color: #F39C12;
    }

    .level-3 {
      background: #E0F7FA;
      color: #00838F;
    }

    .level-4 {
      background: #E8F5E9;
      color: #2E7D32;
    }

    .result-header h2 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .result-header .total-score {
      font-size: 48px;
      font-weight: 800;
      color: var(--primary);
      margin: 4px 0;
    }

    .result-header .total-label {
      font-size: 14px;
      color: var(--text-light);
    }

    .result-section {
      background: var(--card);
      border-radius: 20px;
      padding: 24px;
      box-shadow: var(--shadow);
      margin-bottom: 14px;
    }

    .result-section h3 {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .icon-inline {
      width: 18px;
      height: 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .icon-inline svg {
      width: 100%;
      height: 100%;
    }

    .radar-wrap {
      display: flex;
      justify-content: center;
      margin: 16px 0;
    }

    .score-item {
      margin-bottom: 14px;
    }

    .score-item-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 5px;
    }

    .score-item-name {
      font-size: 14px;
      font-weight: 500;
    }

    .score-item-value {
      font-size: 14px;
      font-weight: 700;
      color: var(--primary);
    }

    .score-bar-bg {
      height: 10px;
      background: var(--border);
      border-radius: 10px;
      overflow: hidden;
    }

    .score-bar-fill {
      height: 100%;
      border-radius: 10px;
      transition: width 1s ease;
      width: 0%;
    }

    .fill-1 {
      background: linear-gradient(90deg, #6C5CE7, #A29BFE);
    }

    .fill-2 {
      background: linear-gradient(90deg, #00CEC9, #81ECEC);
    }

    .fill-3 {
      background: linear-gradient(90deg, #FD79A8, #FDCB6E);
    }

    .fill-4 {
      background: linear-gradient(90deg, #00B894, #55EFC4);
    }

    .fill-5 {
      background: linear-gradient(90deg, #F97F51, #FFC048);
    }

    .fill-6 {
      background: linear-gradient(90deg, #E17055, #FAB1A0);
    }

    /* Briefing Style Result */
    .briefing-box {
      background: linear-gradient(135deg, #F8F7FF 0%, #F0F8FF 100%);
      border-radius: 16px;
      padding: 22px;
      line-height: 1.9;
      font-size: 15px;
      border: 1px solid #E8E8F0;
    }

    .briefing-box .b-greeting {
      font-weight: 700;
      color: var(--primary);
      font-size: 16px;
      margin-bottom: 10px;
    }

    .briefing-box .b-body {
      color: var(--text);
    }

    .briefing-box .b-highlight {
      color: var(--primary);
      font-weight: 600;
    }

    .briefing-box .b-weak {
      color: #E17055;
      font-weight: 600;
    }

    .profile-badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 20px;
      border-radius: 30px;
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 16px;
      background: var(--gradient1);
      color: white;
    }

    .profile-badge .pf-emoji {
      width: 24px;
      height: 24px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .profile-badge .pf-emoji svg {
      width: 100%;
      height: 100%;
    }

    .profile-insight {
      font-size: 15px;
      line-height: 1.9;
      color: var(--text);
      margin-bottom: 14px;
    }

    .profile-insight em {
      display: block;
      padding: 14px 16px;
      margin-bottom: 12px;
      background: white;
      border-radius: 12px;
      font-style: normal;
      color: var(--primary);
      border-left: 4px solid var(--primary-light);
      font-weight: 500;
    }

    .profile-action {
      font-size: 14px;
      line-height: 1.8;
      color: var(--text-light);
      padding: 14px 16px;
      background: white;
      border-radius: 12px;
      border: 1px dashed var(--border);
    }

    .profile-action strong {
      color: var(--primary);
    }

    .briefing-box .b-strong {
      color: #00B894;
      font-weight: 600;
    }

    .plan-container {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-top: 12px;
    }

    .plan-track {
      background: white;
      border-radius: 16px;
      padding: 22px;
      border: 1px solid #E8E8F0;
      box-shadow: 0 2px 8px rgba(108, 92, 231, 0.06);
    }

    .plan-track-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
      padding-bottom: 12px;
      border-bottom: 2px solid #F0EEFF;
    }

    .plan-track-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      flex-shrink: 0;
    }

    .plan-track-icon svg {
      width: 20px;
      height: 20px;
    }

    .track-practice .plan-track-icon {
      background: linear-gradient(135deg, #6C5CE7, #A29BFE);
    }

    .track-learn .plan-track-icon {
      background: linear-gradient(135deg, #00B894, #55EFC4);
    }

    .plan-track-title {
      font-size: 15px;
      font-weight: 700;
    }

    .track-practice .plan-track-title {
      color: #6C5CE7;
    }

    .track-learn .plan-track-title {
      color: #00B894;
    }

    .plan-body {
      font-size: 14px;
      color: var(--text);
      line-height: 1.85;
    }

    .plan-body .plan-item {
      margin-bottom: 14px;
      padding: 14px 16px;
      background: #F8F7FF;
      border-radius: 12px;
      border-left: 3px solid #D5D0F5;
    }

    .track-learn .plan-item {
      background: #F0FFF8;
      border-left: 3px solid #B8F0D8;
    }

    .plan-item-title {
      font-weight: 700;
      font-size: 14px;
      margin-bottom: 6px;
      color: var(--text);
    }

    .plan-item-desc {
      font-size: 13.5px;
      color: var(--text-light);
      line-height: 1.75;
    }

    .plan-summary {
      margin-top: 16px;
      padding: 16px;
      background: linear-gradient(135deg, #F8F7FF, #F0F8FF);
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.8;
      color: var(--text);
      border: 1px dashed #D5D0F5;
    }

    .plan-summary strong {
      color: var(--primary);
    }

    .btn-retry {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--gradient1);
      color: white;
      border: none;
      padding: 14px 36px;
      border-radius: 50px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 20px;
      font-family: 'Noto Sans KR', sans-serif;
      box-shadow: 0 4px 15px rgba(108, 92, 231, 0.4);
    }

    .btn-download {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, #00B894 0%, #00CEC9 100%);
      color: white;
      border: none;
      padding: 14px 36px;
      border-radius: 50px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 12px;
      font-family: 'Noto Sans KR', sans-serif;
      box-shadow: 0 4px 15px rgba(0, 184, 148, 0.4);
      transition: all 0.3s;
    }

    .btn-download:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 25px rgba(0, 184, 148, 0.5);
    }

    .btn-download:disabled {
      opacity: 0.6;
      cursor: wait;
    }

    .btn-download svg {
      width: 20px;
      height: 20px;
    }

    .result-actions {
      text-align: center;
      margin: 28px 0 40px;
    }

    .footer {
      text-align: center;
      padding: 16px;
      font-size: 12px;
      color: var(--text-light);
      border-top: 1px solid var(--border);
      margin-top: 30px;
    }

    @media (max-width: 600px) {
      .container {
        padding: 14px;
      }

      .intro-grid {
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
      }

      .intro-card {
        padding: 12px 8px;
      }

      .intro-card .ic-title {
        font-size: 12px;
      }

      .question-card {
        padding: 22px 18px;
      }

      .result-section {
        padding: 18px;
      }
    }
  </style>
</head>

<body>

  <!-- ===== INTRO ===== -->
  <div id="screen-intro" class="screen active">
    <div class="container">
      <div class="intro-hero">
        <svg class="hero-figure" viewBox="0 0 180 180" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <defs>
            <linearGradient id="bBodyGrad" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0" stop-color="#7dd3fc" />
              <stop offset="1" stop-color="#06c755" />
            </linearGradient>
          </defs>
          <circle cx="90" cy="28" r="8" fill="#06c755" />
          <rect x="86" y="36" width="8" height="14" rx="4" fill="#a7f3d0" />
          <rect x="52" y="44" width="76" height="72" rx="26" fill="url(#bBodyGrad)" />
          <rect x="62" y="58" width="56" height="42" rx="16" fill="#ffffff" />
          <circle cx="78" cy="77" r="6" fill="#1f2937" />
          <circle cx="102" cy="77" r="6" fill="#1f2937" />
          <path d="M75 91c5 6 25 6 30 0" stroke="#1f2937" stroke-width="4" stroke-linecap="round" fill="none" />
          <rect x="38" y="66" width="16" height="10" rx="5" fill="#a7f3d0" />
          <rect x="126" y="66" width="16" height="10" rx="5" fill="#a7f3d0" />
          <rect x="64" y="114" width="14" height="30" rx="7" fill="#34d399" />
          <rect x="102" y="114" width="14" height="30" rx="7" fill="#34d399" />
          <rect x="60" y="142" width="22" height="10" rx="5" fill="#1f2937" />
          <rect x="98" y="142" width="22" height="10" rx="5" fill="#1f2937" />
        </svg>
        <div class="intro-summary">6개 영역으로 진단 내용을 빠르게 점검해요.</div>
        <div style="text-align:center;">
          <button class="btn-start" onclick="startQuiz()">검진 시작하기 →</button>
          <div class="intro-note">부담 없이 풀어보세요. 정답이 따로 있는 시험이 아니에요.</div>
        </div>
      </div>

      <div class="intro-grid">
        <div class="intro-card">
          <div class="ic-emoji"><svg viewBox="0 0 24 24" fill="none">
              <path d="M12 3.5c4.2 0 7.5 3 7.5 7.2 0 4.1-3.3 7.3-7.5 7.3s-7.5-3.2-7.5-7.3C4.5 6.5 7.8 3.5 12 3.5Z"
                stroke="#6C5CE7" stroke-width="2" />
              <path d="M9 10.7h6M9.5 14h5" stroke="#6C5CE7" stroke-width="2" stroke-linecap="round" />
            </svg></div>
          <div class="ic-title">AI 이해하기</div>
        </div>
        <div class="intro-card">
          <div class="ic-emoji"><svg viewBox="0 0 24 24" fill="none">
              <rect x="4" y="4" width="16" height="12" rx="4" stroke="#00CEC9" stroke-width="2" />
              <path d="m9 16 3 3 3-3" stroke="#00CEC9" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round" />
            </svg></div>
          <div class="ic-title">AI와 소통하기</div>
        </div>
        <div class="intro-card">
          <div class="ic-emoji"><svg viewBox="0 0 24 24" fill="none">
              <path d="M6 14.5V9.8a2.8 2.8 0 0 1 2.8-2.8h6.4A2.8 2.8 0 0 1 18 9.8v4.7" stroke="#FD79A8"
                stroke-width="2" />
              <rect x="4.5" y="13.5" width="4" height="5.5" rx="1.4" fill="#FD79A8" />
              <rect x="15.5" y="13.5" width="4" height="5.5" rx="1.4" fill="#FD79A8" />
            </svg></div>
          <div class="ic-title">AI 도구 경험</div>
        </div>
        <div class="intro-card">
          <div class="ic-emoji"><svg viewBox="0 0 24 24" fill="none">
              <rect x="7" y="3.5" width="10" height="17" rx="2.5" stroke="#00B894" stroke-width="2" />
              <circle cx="12" cy="16.5" r="1.2" fill="#00B894" />
            </svg></div>
          <div class="ic-title">일상에서 AI 쓰기</div>
        </div>
        <div class="intro-card">
          <div class="ic-emoji"><svg viewBox="0 0 24 24" fill="none">
              <circle cx="11" cy="11" r="6" stroke="#F97F51" stroke-width="2" />
              <path d="m16 16 4 4" stroke="#F97F51" stroke-width="2" stroke-linecap="round" />
            </svg></div>
          <div class="ic-title">AI 결과 판단하기</div>
        </div>
        <div class="intro-card">
          <div class="ic-emoji"><svg viewBox="0 0 24 24" fill="none">

    let currentQ = 0;

    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function startQuiz() {
      currentQ = 0;
      answers = new Array(questions.length).fill(-1);
      showScreen('screen-quiz');
      renderQuestion();
    }

    function renderQuestion() {
      const q = questions[currentQ];
      const cat = categories[q.cat];
      const pct = ((currentQ + 1) / questions.length) * 100;
      document.getElementById('progressBar').style.width = pct + '%';
      document.getElementById('progressText').textContent = `${currentQ + 1} / ${questions.length}`;
      document.getElementById('categoryBadge').innerHTML = `${icon(cat.icon, '#FFFFFF')} ${cat.name}`;
      document.getElementById('categoryBadge').style.background = cat.color;
      document.getElementById('qNumber').textContent = `Q${currentQ + 1}`;
      document.getElementById('qText').textContent = q.text;

      const tipEl = document.getElementById('qTip');
      if (q.tip) { tipEl.style.display = 'block'; tipEl.innerHTML = `${icon('tip', '#6C5CE7')} ${q.tip}`; }
      else { tipEl.style.display = 'none'; }

      const optWrap = document.getElementById('qOptions');
      optWrap.innerHTML = '';
      q.options.forEach((opt, i) => {
        const div = document.createElement('div');
        div.className = 'option' + (answers[currentQ] === i ? ' selected' : '');
        div.innerHTML = `<div class="option-radio"></div><span>${opt}</span>`;
        div.onclick = () => selectOption(i);
        optWrap.appendChild(div);
      });

      document.getElementById('btnPrev').style.visibility = currentQ === 0 ? 'hidden' : 'visible';
      const btnNext = document.getElementById('btnNext');
      btnNext.disabled = answers[currentQ] === -1;
      btnNext.textContent = currentQ === questions.length - 1 ? '결과 보기' : '다음 →';

      document.getElementById('questionCard').style.animation = 'none';
      setTimeout(() => { document.getElementById('questionCard').style.animation = 'slideIn 0.3s ease'; }, 10);
    }

    function selectOption(idx) {
      answers[currentQ] = idx;
      document.querySelectorAll('.option').forEach((el, i) => { el.classList.toggle('selected', i === idx); });
      document.getElementById('btnNext').disabled = false;
    }

    function nextQuestion() {
      if (answers[currentQ] === -1) return;
      if (currentQ < questions.length - 1) { currentQ++; renderQuestion(); }
      else { showResults(); }
    }

    function prevQuestion() {
      if (currentQ > 0) { currentQ--; renderQuestion(); }
    }

    function showResults() {
      const catScores = new Array(6).fill(0);
      const catMax = new Array(6).fill(0);
      questions.forEach((q, i) => {
        catScores[q.cat] += q.scores[answers[i]];
        catMax[q.cat] += 3;
      });
      // Scale each category to ~17 points (6 categories, total ≈ 100)
      const scaled = catScores.map((s, i) => Math.round((s / catMax[i]) * 17));
      const total = scaled.reduce((a, b) => a + b, 0);

      let level, levelTitle, levelIcon, levelClass;
      if (total >= 80) { level = 4; levelTitle = "Lv.4 능숙한 활용자"; levelIcon = "level4"; levelClass = "level-4"; }
      else if (total >= 55) { level = 3; levelTitle = "Lv.3 성장하는 학습자"; levelIcon = "level3"; levelClass = "level-3"; }
      else if (total >= 30) { level = 2; levelTitle = "Lv.2 호기심 가득 탐색자"; levelIcon = "level2"; levelClass = "level-2"; }
      else { level = 1; levelTitle = "Lv.1 첫 발을 내딛는 중"; levelIcon = "level1"; levelClass = "level-1"; }

      showScreen('screen-result');
      document.getElementById('resultEmoji').innerHTML = icon(levelIcon, '#6C5CE7');
      document.getElementById('levelBadge').textContent = levelTitle;
      document.getElementById('levelBadge').className = 'level-badge ' + levelClass;
      document.getElementById('levelTitle').textContent = `당신은 "${levelTitle}"`;
      document.getElementById('totalScore').textContent = total;

      // Score bars
      const barHtml = categories.map((cat, i) => `
    <div class="score-item">
      <div class="score-item-header">
        <span class="score-item-name">${icon(cat.icon, cat.color)} ${cat.name}</span>
        <span class="score-item-value">${scaled[i]} / 17</span>
      </div>
      <div class="score-bar-bg">
        <div class="score-bar-fill fill-${i + 1}" id="bar-${i}"></div>
      </div>
    </div>
  `).join('');
      document.getElementById('scoreBarList').innerHTML = barHtml;
      setTimeout(() => { scaled.forEach((s, i) => { document.getElementById(`bar-${i}`).style.width = `${(s / 17) * 100}%`; }); }, 200);

      drawRadar(scaled, 17);
      generateBriefing(scaled, total, level, levelTitle);
      generateRecBriefing(scaled);
    }

    // ===== RADAR CHART =====
    function drawRadar(scores, maxVal) {
      const canvas = document.getElementById('radarChart');
      const ctx = canvas.getContext('2d');
      const dpr = window.devicePixelRatio || 1;
      canvas.width = 320 * dpr; canvas.height = 320 * dpr;
      canvas.style.width = '320px'; canvas.style.height = '320px';
      ctx.scale(dpr, dpr);

      const cx = 160, cy = 160, maxR = 110, n = 6;
      const angleStep = (Math.PI * 2) / n;
      const startAngle = -Math.PI / 2;

      // Grid
      ctx.strokeStyle = '#E8E8F0'; ctx.lineWidth = 1;
      for (let ring = 1; ring <= 4; ring++) {
        const r = (ring / 4) * maxR;
        ctx.beginPath();
        for (let i = 0; i <= n; i++) {
          const a = startAngle + i * angleStep;
          const x = cx + r * Math.cos(a), y = cy + r * Math.sin(a);
          i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        }
        ctx.closePath(); ctx.stroke();
      }

      // Axes
      for (let i = 0; i < n; i++) {
        const a = startAngle + i * angleStep;
        ctx.beginPath(); ctx.moveTo(cx, cy);
        ctx.lineTo(cx + maxR * Math.cos(a), cy + maxR * Math.sin(a)); ctx.stroke();
      }

      // Data
      ctx.beginPath();
      const pts = [];
      for (let i = 0; i < n; i++) {
        const a = startAngle + i * angleStep;
        const r = (scores[i] / maxVal) * maxR;
        const x = cx + r * Math.cos(a), y = cy + r * Math.sin(a);
        pts.push({ x, y });
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
      ctx.closePath();
      ctx.fillStyle = 'rgba(108, 92, 231, 0.2)'; ctx.fill();
      ctx.strokeStyle = '#6C5CE7'; ctx.lineWidth = 2.5; ctx.stroke();

      pts.forEach(p => {
        ctx.beginPath(); ctx.arc(p.x, p.y, 5, 0, Math.PI * 2);
        ctx.fillStyle = '#6C5CE7'; ctx.fill();
        ctx.strokeStyle = 'white'; ctx.lineWidth = 2; ctx.stroke();
      });

      // Labels
      ctx.fillStyle = '#2D3436'; ctx.font = '12px Noto Sans KR, sans-serif'; ctx.textAlign = 'center';
      const lbls = categories.map(c => c.name);
      for (let i = 0; i < n; i++) {
        const a = startAngle + i * angleStep;
        const lr = maxR + 26;
        let x = cx + lr * Math.cos(a), y = cy + lr * Math.sin(a);
        if (i === 0) y -= 3;
        if (i === 3) y += 5;
        ctx.fillText(lbls[i], x, y);
      }
    }

    // ===== PROFILE TYPE =====
    function getProfileType(scores) {
      // scores: [0]=이해, [1]=소통, [2]=도구경험, [3]=일상활용, [4]=결과판단, [5]=마인드셋

      };

      // D: 호기심 탐색가형

        emoji: '🔬', name: '호기심 탐색가형',
        insight: '다양한 AI를 이것저것 써보셨네요! 호기심이 강한 분이에요. 다만 아직 일상에 정착시키지 못하고 \'체험\'에 머물러 있어요. 여러 식당을 돌아다니며 맛보기만 하고, 단골집은 아직 못 정한 느낌이랄까요.',

      };
    }

          desc: "AI는 글쓰기·요약·번역·아이디어 생성에 강하지만, 최신 정보 확인·수학 계산·감정적 판단은 약해요. 이 차이를 알면 AI에게 '적절한 기대'를 할 수 있어요."
        });
      } else if (avg <= 11) {
        learnItems.push({
          title: "멀티모달 AI의 세계 알아보기",
          desc: "2025년의 AI는 텍스트뿐 아니라 이미지, 음성, 영상, 문서까지 이해하고 만들 수 있어요. ChatGPT의 음성 대화, Claude의 파일 분석 기능 등을 알아두면 활용 폭이 확 넓어져요."
        });
        learnItems.push({
          title: "AI 안전하게 사용하는 법",
          desc: "AI에게 주민등록번호, 비밀번호, 의료 정보 같은 민감한 개인정보를 입력하면 안 돼요. 또한 AI가 만든 정보를 공유할 때는 '이건 AI가 만든 내용이야'라고 밝히는 습관이 중요해요."
        });
      } else {
        learnItems.push({
          title: "AI 에이전트 시대 이해하기",
          desc: "최신 AI는 단순히 질문에 답하는 것을 넘어, 스스로 계획을 세우고 여러 단계의 작업을 수행하는 '에이전트'로 진화하고 있어요. 이 변화를 이해하면 AI를 더 전략적으로 활용할 수 있어요."
        });
        learnItems.push({
          title: "AI 리터러시 — 비판적 사고력 강화",
          desc: "AI를 잘 쓰는 것 못지않게, AI가 만든 정보를 비판적으로 평가하는 능력이 중요해요. AI의 편향성, 환각 현상(hallucination), 저작권 이슈 등을 이해하면 더 현명한 사용자가 돼요."
        });
      }

      // 취약 영역 맞춤 학습 가이드 추가
      if (weak.length > 0 || mid.length > 0) {
        const targets = weak.length > 0 ? weak : mid;
        const target = targets.length > 1 ? targets[1] : targets[0];
        const learnByArea = {
          0: { title: "AI 작동 원리 기초 학습", desc: "AI는 수많은 텍스트를 학습해서 '다음에 올 단어를 예측'하는 방식으로 작동해요. 이 원리를 알면 왜 AI가 가끔 그럴듯하게 틀리는지 이해할 수 있어요. '할루시네이션(환각)'이라고 불러요." },
          1: { title: "효과적인 AI 대화법 학습", desc: "AI와 잘 소통하는 핵심은 세 가지예요: ① 내 상황을 구체적으로 알려주기 ② 원하는 결과물의 형태를 말해주기 ③ 마음에 안 들면 피드백을 주며 이어가기. 이 세 가지만 기억하세요." },
          2: { title: "AI 도구 지도 그리기", desc: "텍스트 AI(ChatGPT, Claude), 이미지 AI(미드저니, DALL-E, 캔바 AI), 음성 AI(클로바노트), 영상 AI(Vrew) 등 용도별 대표 도구가 있어요. 어떤 AI가 어떤 일을 하는지 지도를 그려보세요." },
          3: { title: "AI 활용 사례 탐색하기", desc: "다른 사람들은 AI를 어떻게 쓰고 있을까요? '주부의 AI 활용법', '은퇴 후 AI로 글쓰기' 같은 활용 사례를 찾아보면 나에게 맞는 활용법을 발견할 수 있어요." },
          4: { title: "디지털 리터러시 기초 쌓기", desc: "AI 결과물을 평가하려면 기본적인 정보 검증 능력이 필요해요. 출처 확인하기, 여러 정보원 비교하기, 날짜 확인하기 등 기본적인 팩트체크 습관을 들여보세요." },
          5: { title: "AI 시대 마인드셋 기르기", desc: "AI 시대에 가장 중요한 자질은 '기술 전문가'가 아니라 '계속 배우는 사람'이에요. 완벽하게 알 필요 없어요. 호기심을 갖고 조금씩 배우는 자세가 가장 큰 경쟁력이에요." }
        };
        learnItems.push(learnByArea[target.idx]);
      }

      // ── 종합 한마디 ──
      let summaryMsg = '';
      if (avg <= 5) {
        summaryMsg = '지금 가장 중요한 건 <strong>AI와 친해지는 것</strong>이에요. 완벽하게 이해하려 하지 말고, 하루에 한 번 AI를 열어보는 것부터 시작하세요. 작은 습관이 큰 변화를 만들어요.';
      } else if (avg <= 11) {
        summaryMsg = '기본기가 갖춰져 있으니, 이제는 <strong>활용의 폭을 넓히고 깊이를 더하는 단계</strong>예요. 새로운 AI 도구를 하나 더 써보고, 대화를 이어가며 결과를 다듬는 연습을 해보세요.';
      } else {
        summaryMsg = 'AI를 잘 활용하고 계세요! 이제는 <strong>나만의 AI 활용 전략을 체계화</strong>하고, 주변 사람들에게 나의 노하우를 공유하면서 함께 성장해보세요.';
      }

      // ── HTML 렌더링 ──
      let html = '<div class="plan-container">';

      // Track 1
      html += `<div class="plan-track track-practice">
    <div class="plan-track-header">
      <div class="plan-track-icon">${getIconSvg('action')}</div>
      <div class="plan-track-title">AI 활용을 통한 레벨업</div>
    </div>
    <div class="plan-body">`;
      practiceItems.forEach(item => {
        html += `<div class="plan-item">
      <div class="plan-item-title">▸ ${item.title}</div>
      <div class="plan-item-desc">${item.desc}</div>
    </div>`;
      });
      html += `</div></div>`;

      // Track 2
      html += `<div class="plan-track track-learn">
    <div class="plan-track-header">
      <div class="plan-track-icon">${getIconSvg('learning')}</div>
      <div class="plan-track-title">AI 학습을 통한 레벨업</div>
    </div>
    <div class="plan-body">`;
      learnItems.forEach(item => {
        html += `<div class="plan-item">
      <div class="plan-item-title">▸ ${item.title}</div>
      <div class="plan-item-desc">${item.desc}</div>
    </div>`;
      });
      html += `</div></div>`;

      // Summary
      html += `<div class="plan-summary">${icon('chat', '#6C5CE7')} ${summaryMsg}</div>`;
      html += '</div>';

      document.getElementById('recList').innerHTML = html;
    }

    function retryQuiz() { startQuiz(); }

    document.getElementById('analysisIcon').innerHTML = getIconSvg('analysis');
    document.getElementById('profileIcon').innerHTML = getIconSvg('profile');
    document.getElementById('planIcon').innerHTML = getIconSvg('plan');
    document.getElementById('retryIcon').innerHTML = getIconSvg('refresh');

    async function downloadResult() {
      const btn = document.querySelector('.btn-download');
      const originalText = btn.innerHTML;
      btn.disabled = true;
      btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg> 저장 중...';

      try {
        const target = document.getElementById('screen-result');
        const canvas = await html2canvas(target, {
          scale: 2,
          useCORS: true,
          backgroundColor: '#F5F3FF',
          scrollY: -window.scrollY,
          windowWidth: target.scrollWidth,
          windowHeight: target.scrollHeight
        });

        const dataUrl = canvas.toDataURL('image/png');
        const now = new Date();
        const fileName = `AI검진_입문_${now.getFullYear()}${String(now.getMonth() + 1).padStart(2, '0')}${String(now.getDate()).padStart(2, '0')}.png`;

        // 모바일 공유 API 지원 시 (갤러리 저장 가능)
        if (navigator.share && /Mobi|Android/i.test(navigator.userAgent)) {
          const blob = await (await fetch(dataUrl)).blob();
          const file = new File([blob], fileName, { type: 'image/png' });
          try {
            await navigator.share({ files: [file], title: 'AI 활용능력 자가검진 결과' });
          } catch (e) {
            // 공유 취소 시 폴백으로 다운로드
            triggerDownload(dataUrl, fileName);
          }
        } else {
          triggerDownload(dataUrl, fileName);
        }
      } catch (err) {
        alert('이미지 저장에 실패했습니다. 다시 시도해주세요.');
        console.error(err);
      } finally {
        btn.disabled = false;
        btn.innerHTML = originalText;
      }
    }

    function triggerDownload(dataUrl, fileName) {
      const link = document.createElement('a');
      link.download = fileName;
      link.href = dataUrl;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }
  </script>
</body>

</html>
